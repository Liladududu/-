<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>职业方向测评</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-size: 18px; -webkit-text-size-adjust: 100% !important; text-size-adjust: 100% !important; }
    #shell { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1rem 0.75rem 2rem; }
    #root { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; width: 100%; max-width: 480px; padding: 0 4px; }
    .opt-btn { display: block; width: 100%; text-align: left; padding: 16px 18px; border: 0.5px solid #e0e0e0; border-radius: 12px; background: #fff; color: #111; font-size: 16px; cursor: pointer; margin-bottom: 10px; line-height: 1.6; transition: border-color 0.15s, background 0.15s; -webkit-tap-highlight-color: transparent; }
    .opt-btn:active { background: #EEEDFE; border-color: #7F77DD; }
    .tag { font-size: 13px; background: #f5f5f5; color: #555; border: 0.5px solid #ddd; padding: 4px 12px; border-radius: 99px; }
    .primary-btn { display: block; width: 100%; padding: 17px; background: #534AB7; color: #fff; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .secondary-btn { display: block; width: 100%; padding: 15px; background: #f5f5f5; color: #111; border: 0.5px solid #e0e0e0; border-radius: 12px; font-size: 16px; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; margin-top: 10px; }
    .card { border: 0.5px solid #ddd; border-radius: 14px; padding: 1.5rem; background: #fff; margin-bottom: 12px; }
    .badge { display: inline-block; background: #EEEDFE; color: #534AB7; font-size: 13px; padding: 4px 12px; border-radius: 8px; margin-bottom: 1rem; line-height: 1.6; }
    .info-box { background: #f5f5f5; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .warn-box { background: #FFF8EC; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; border: 0.5px solid #FFE0A0; }
    .dir-tag { background: #f5f5f5; color: #111; font-size: 14px; padding: 5px 13px; border-radius: 99px; border: 0.5px solid #ddd; display: inline-block; margin-bottom: 6px; margin-right: 4px; }
    .progress-track { height: 4px; background: #ddd; border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  </style>
</head>
<body>
<div id="shell"><div id="root"></div></div>
<script>
let profile = { major:null, status:null, pathFeel:null, system:null, city:null, constraint:null, agency:null };
let scores = { I:0, S:0, A:0, E:0, R:0, C:0, GOV:0, INST:0, SOE:0 };
let s1idx=0, s2queue=[], s2idx=0, phase='cover';

const STAGE1 = [
  { id:'major', q:'你目前的专业或工作背景是哪个方向？', sub:'选最接近的那个就好',
    opts:[{t:'理工科（数学、物理、计算机、工程等）',v:'stem'},{t:'商科（经济、金融、管理、市场等）',v:'biz'},{t:'文科 / 社科（中文、历史、哲学、社会学等）',v:'hum'},{t:'艺术 / 设计 / 传媒',v:'art'},{t:'医学 / 生命科学 / 心理学',v:'med'},{t:'法学 / 政治学 / 国际关系',v:'law'}]},
  { id:'status', q:'你现在是什么状态？',
    opts:[{t:'在读大学生，还没工作过',v:'student'},{t:'应届 / 刚毕业，在找工作或刚入职',v:'fresh'},{t:'工作 1–3 年，开始想清楚方向',v:'early'},{t:'工作 3 年以上，考虑转型或深耕',v:'mid'}]},
  { id:'pathFeel', q:'你对自己目前的专业或职业路径，真实感受是？', sub:'选一个最接近你内心的',
    opts:[{t:'挺认同的，愿意沿着这条路走下去',v:'yes'},{t:'还行，但感觉不够有劲，缺点什么',v:'meh'},{t:'不太认同，但不知道能去哪儿',v:'lost'},{t:'明确感觉不适合，很想换方向',v:'no'}]},
  { id:'system', q:'你对"进体制"这件事，真实态度是？', sub:'体制包括公务员、事业单位、国企、央企',
    opts:[{t:'我主动想进，稳定和保障对我很重要',v:'want'},{t:'可以接受，但不是唯一选项',v:'open'},{t:'不太想，我更倾向体制外',v:'no'}]},
  { id:'city', q:'你对未来工作城市的倾向是？', sub:'说说你内心真实的想法',
    opts:[{t:'一线城市（北上广深）——想要更大的舞台',v:'tier1'},{t:'省会或新一线——平衡机会和生活质量',v:'province'},{t:'回老家县城或小城市——稳定、离家近',v:'hometown'}]},
  { id:'constraint', q:'你有没有必须考虑的现实压力？', sub:'比如父母催婚、家庭经济、户口、父母养老等',
    opts:[{t:'有，而且影响我做决定的权重很大',v:'high'},{t:'有，但我还是想优先考虑自己的感受',v:'mid'},{t:'基本没有，我可以相对自由地选择',v:'low'}]},
  { id:'agency', q:'下面两种人，你更像哪一种？', sub:'不是说哪种更好，只是真实描述',
    opts:[{t:'主动型：我会主动规划、找机会、推动事情发生',v:'active'},{t:'被动型：有好的机会出现我会去抓；没有就走一步看一步',v:'passive'}]}
];

const UNIVERSAL = [
  { q:'毕业前有两个实习机会，你倾向选哪个？',
    opts:[{t:'大厂产品岗，加班多但能学到东西，简历好看',d:'E'},{t:'科研院所助理，节奏慢，但可以深入研究一个课题',d:'I'},{t:'公益组织，薪资低，但每天都在帮助真实的人',d:'S'},{t:'设计公司，可以做真正有创意的项目',d:'A'}]},
  { q:'朋友圈有一篇刷屏的文章，你的第一反应是？',
    opts:[{t:'想看看论证逻辑有没有漏洞',d:'I'},{t:'转发给觉得需要看到的朋友',d:'S'},{t:'想想这个话题自己能不能写点什么',d:'A'},{t:'想想这个现象背后有没有商业机会',d:'E'}]},
  { q:'周五下班，领导说下周一要一份新方案，你的状态是？',
    opts:[{t:'有点烦，但会把思路先整理好，周末认真做',d:'C'},{t:'立刻问清楚目标和边界，然后高效执行',d:'E'},{t:'希望自己能想出一个别人没想到的角度',d:'A'},{t:'第一反应是找同事商量，一起搞比较有劲',d:'S'}]},
  { q:'你觉得哪种"被夸"最让你开心？',
    opts:[{t:'"你想事情比别人深，这个细节你都注意到了"',d:'I'},{t:'"跟你聊完感觉好多了，你真的很懂我"',d:'S'},{t:'"这个东西做得太好看了，有你自己的风格"',d:'A'},{t:'"这件事没你根本推不下去，你是关键"',d:'E'}]},
  { q:'你最难接受哪种工作状态？',
    opts:[{t:'每天处理重复的表格和流程，没有需要思考的地方',d:'I'},{t:'一个人对着屏幕，几乎不需要跟人交流',d:'S'},{t:'所有东西都有模板，不允许有自己的风格',d:'A'},{t:'等别人安排，自己没法主动推进任何事',d:'E'}]},
  { q:'连续放假一周到了第五天，你通常在做什么？',
    opts:[{t:'在看书、看纪录片或研究某个感兴趣的问题',d:'I'},{t:'约了朋友或在打电话聊天，享受连接感',d:'S'},{t:'沉浸在某个创作里——写作、拍照、做东西',d:'A'},{t:'开始焦虑，在列下周的计划或找新目标',d:'C'}]},
  { q:'做完一件事，什么情况让你觉得"这次真的值"？',
    opts:[{t:'我真正搞懂了之前不懂的事，有种豁然开朗',d:'I'},{t:'有人因为这件事变好了，跟我说了声谢谢',d:'S'},{t:'最后呈现的东西我自己也觉得好，有点骄傲',d:'A'},{t:'结果超出预期，而且是我推动的',d:'E'}]},
  { q:'如果你现在有三个月空窗期，你最可能在做什么？',
    opts:[{t:'系统学一门新东西，把它真正搞懂',d:'I'},{t:'做志愿者、陪家人，或帮朋友解决问题',d:'S'},{t:'做一个一直想做的创作项目',d:'A'},{t:'尝试做一个小副业或项目，看看能不能跑起来',d:'E'}]}
];

const TARGETED = {
  stem_yes:[{q:'有两个方向可以走，你更倾向哪个？',opts:[{t:'算法 / 架构方向——深耕技术，成为某领域专家',d:'I'},{t:'产品 / 技术管理——技术是工具，我更想有影响力',d:'E'},{t:'数据 / 分析——用数字帮助别人做更好的决策',d:'C'},{t:'技术 + 设计——做出好用又好看的东西',d:'A'}]},{q:'理工类工作里，你什么时候最有感觉？',opts:[{t:'碰到一个真正难的问题，非得深想才能解决',d:'I'},{t:'做出来的东西被真实用户用上了',d:'R'},{t:'带着大家一起推着事情往前走',d:'E'},{t:'把复杂的逻辑梳理得非常清晰，无懈可击',d:'C'}]}],
  stem_meh:[{q:'你学理工但感觉缺点什么——最像哪个？',opts:[{t:'缺少和人真正互动的机会，太孤立了',d:'S'},{t:'缺少创意空间，全是逻辑和规范',d:'A'},{t:'缺少目标感，不知道做这些有什么意义',d:'E'},{t:'缺少产出感，做的东西太抽象',d:'R'}]},{q:'如果在理工背景上加一个新维度，你最想加哪个？',opts:[{t:'设计思维——让技术更好看、更好用',d:'A'},{t:'商业视角——让技术转化成真正的价值',d:'E'},{t:'社科视角——理解技术背后的人和社会',d:'S'},{t:'研究深度——在某个领域做到真正极致',d:'I'}]}],
  stem_lost:[{q:'你学理工但感觉不认同，最根本原因是？',opts:[{t:'对技术本身没兴趣，每天硬学很痛苦',d:'S'},{t:'太孤立，缺少和人真正连接的感觉',d:'S'},{t:'没有创意空间，全是逻辑和规范',d:'A'},{t:'感觉做的东西离真实世界太远',d:'R'}]},{q:'你最想转去做哪类事？',opts:[{t:'教育 / 科普——把复杂的东西讲清楚给别人听',d:'S'},{t:'设计 / 产品——把技术和美感结合起来',d:'A'},{t:'商业 / 运营——用理性思维做市场和增长',d:'E'},{t:'写作 / 内容——做有深度的科技媒体或分析',d:'I'}]}],
  stem_no:[{q:'你明确不想继续理工方向，最想去试试的是？',opts:[{t:'教育 / 培训——把我懂的东西教给别人',d:'S'},{t:'设计 / 创意——做有美感、有创意的事',d:'A'},{t:'商业 / 创业——把技术能力用在更大的目标上',d:'E'},{t:'写作 / 媒体——做深度内容或科技评论',d:'I'}]}],
  biz_yes:[{q:'商科很宽，你更偏向哪一侧？',opts:[{t:'数字和分析——财务、数据、投资、战略',d:'C'},{t:'人和沟通——销售、市场、品牌、公关',d:'S'},{t:'推动和创造——运营、BD、创业、增长',d:'E'},{t:'研究和洞察——咨询、用研、行业分析',d:'I'}]},{q:'五年后你希望自己在哪种位置？',opts:[{t:'某个细分领域的专业分析师或顾问',d:'I'},{t:'带团队的管理者，负责一块业务',d:'E'},{t:'在稳定机构做核心岗位',d:'R'},{t:'还没想好，走一步看一步',d:'C'}]}],
  biz_meh:[{q:'商科里哪个方向听起来最让你想了解？',opts:[{t:'咨询或战略——帮企业解决真正复杂的问题',d:'I'},{t:'品牌或创意营销——让商业更有美感和故事',d:'A'},{t:'创业或增长——自己推动一件事从零到一',d:'E'},{t:'投资或分析——用数字判断未来方向',d:'C'}]}],
  biz_lost:[{q:'如果不考虑"学了商科怎么办"，你更想做哪类事？',opts:[{t:'直接帮助到具体的人，有真实的人情连接',d:'S'},{t:'做有个人风格的创作，留下一些东西',d:'A'},{t:'在某个我真正感兴趣的领域深入研究',d:'I'},{t:'推动一件真正有社会意义的事发生',d:'E'}]}],
  biz_no:[{q:'你明确想离开商科路径，最想去试试的是？',opts:[{t:'设计 / 创意——做有审美的东西',d:'A'},{t:'教育 / 心理——帮助人成长',d:'S'},{t:'技术 / 产品——做有实感的东西',d:'R'},{t:'写作 / 研究——深入一个我真正好奇的领域',d:'I'}]}],
  hum_yes:[{q:'文科出身有很多路，你更认同哪个方向？',opts:[{t:'内容 / 媒体 / 编辑——用文字影响人',d:'A'},{t:'教育 / 咨询 / 公益——直接帮助人成长',d:'S'},{t:'研究 / 政策 / 学术——往深度和专业走',d:'I'},{t:'品牌 / 公关 / 运营——把文科思维用在商业里',d:'E'}]},{q:'如果可以在文科基础上加一个新技能，你最想加哪个？',opts:[{t:'数据分析——让我的判断更有说服力',d:'I'},{t:'设计或视觉表达——让我的内容更有传播力',d:'A'},{t:'运营或商业思维——让我能推动事情真正落地',d:'E'},{t:'心理学或咨询技能——更深入理解和帮助人',d:'S'}]}],
  hum_meh:[{q:'你学文科但感觉缺点劲，最可能是因为什么？',opts:[{t:'出路不清晰，不知道读完能做什么',d:'C'},{t:'周围人都在考公 / 考研，我不确定这是不是我想要的',d:'I'},{t:'想做更有创意的工作，但不知道怎么起步',d:'A'},{t:'想要更直接的影响力，感觉文科太"间接"了',d:'E'}]}],
  hum_lost:[{q:'你最不想过哪种职业生活？',opts:[{t:'坐在格子间里处理重复的文件和流程',d:'A'},{t:'一个人面对电脑，几乎不和人交流',d:'S'},{t:'做执行，永远等别人告诉我做什么',d:'E'},{t:'做很虚的事，看不到实际的结果',d:'R'}]},{q:'如果能从零开始选一个领域，最吸引你的是？',opts:[{t:'心理学或社会工作方向',d:'S'},{t:'创意写作或内容创作方向',d:'A'},{t:'教育或培训方向',d:'S'},{t:'商业分析或用研方向',d:'I'}]}],
  hum_no:[{q:'你想转到更有技术感或路径更清晰的方向，愿意付出多大代价？',opts:[{t:'愿意花时间重新学，哪怕从零开始',d:'R'},{t:'希望有一个过渡，不要断层太大',d:'C'},{t:'想先找一个能用上现有能力的交叉点',d:'I'},{t:'还没想那么细，先找方向再说',d:'E'}]}],
  art_yes:[{q:'纯创作 vs 商业应用，你更偏哪边？',opts:[{t:'纯创作——我想做有个人风格的东西',d:'A'},{t:'商业应用——我愿意把创意用在解决实际问题上',d:'R'},{t:'两者结合——创意加商业逻辑，比如品牌或体验设计',d:'E'},{t:'还在探索，都有兴趣但还没定',d:'I'}]},{q:'你在创作或设计时，最大的驱动力是什么？',opts:[{t:'想做出让我自己也觉得好看的东西',d:'A'},{t:'想让用户或观众真正受到触动',d:'S'},{t:'想探索一个概念或想法的边界',d:'I'},{t:'想解决一个真实的问题，设计是手段',d:'R'}]}],
  art_meh:[{q:'你在艺术 / 设计方向但感觉缺点劲，最可能是因为？',opts:[{t:'创作空间被限制，太多甲方或规范',d:'A'},{t:'缺少商业认可，不知道能不能养活自己',d:'C'},{t:'缺少更深的思想性，想做有内涵的东西',d:'I'},{t:'缺少和人真正互动的感觉，太孤独了',d:'S'}]}],
  art_lost:[{q:'你最想转去做哪类事？',opts:[{t:'商业 / 运营——做有结果感的事',d:'E'},{t:'教育 / 咨询——直接帮助人成长',d:'S'},{t:'研究 / 分析——深入理解一个领域',d:'I'},{t:'技术 / 产品——把想法做成真实可用的东西',d:'R'}]}],
  art_no:[{q:'你明确想离开艺术 / 设计路径，最想去哪个方向？',opts:[{t:'商业 / 运营——做有结果感的事',d:'E'},{t:'教育 / 咨询——直接帮助人成长',d:'S'},{t:'研究 / 分析——深入理解一个领域',d:'I'},{t:'技术 / 产品——做有实感的东西',d:'R'}]}],
  med_yes:[{q:'医学 / 心理方向里，你对哪条路最有感觉？',opts:[{t:'临床路线——和真实的病人或来访者打交道',d:'S'},{t:'研究路线——实验室或学术研究',d:'I'},{t:'健康科技路线——把医学和产品结合',d:'E'},{t:'科普 / 教育路线——让更多人理解健康知识',d:'A'}]}],
  med_meh:[{q:'你在医学 / 心理方向但感觉缺点什么，最可能是？',opts:[{t:'感觉路太窄，只有几条固定路可以走',d:'E'},{t:'太多死记硬背，缺少真正思考和创造的空间',d:'I'},{t:'压力太大、节奏太重，和我想要的生活不匹配',d:'A'},{t:'想更直接地帮到人，但工作离人太远',d:'S'}]}],
  med_lost:[{q:'你在医学 / 心理背景但感觉不认同，最根本的原因是？',opts:[{t:'当初是被家人推进来的，不是自己选的',d:'E'},{t:'对这个领域本身越来越没有热情',d:'I'},{t:'承受不了这个行业的压力和代价',d:'C'},{t:'想做更有创意或商业感的工作',d:'A'}]}],
  med_no:[{q:'你明确想离开医学 / 心理路径，最想去的新方向是？',opts:[{t:'商业 / 运营 / 市场',d:'E'},{t:'设计 / 创意 / 内容',d:'A'},{t:'技术 / 产品 / 数据',d:'I'},{t:'教育 / 公益 / 社会工作',d:'S'}]}],

function buildQueue() {
  const {major,pathFeel,status,system} = profile;
  const q = [...UNIVERSAL];
  const key = major+'_'+pathFeel;
  if(TARGETED[key]) q.push(...TARGETED[key]);
  if(status==='student'&&TARGETED['student_any']) q.push(...TARGETED['student_any']);
  if(status==='mid'&&TARGETED['mid_any']) q.push(...TARGETED['mid_any']);
  if(system==='want') q.push(...SYSTEM_Q);
  const uni = q.slice(0,UNIVERSAL.length);
  const tgt = q.slice(UNIVERSAL.length);
  for(let i=uni.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[uni[i],uni[j]]=[uni[j],uni[i]];}
  s2queue = [...uni.slice(0,6),...tgt].slice(0,14);
}

function addScore(d){if(scores[d]!==undefined)scores[d]++;}

function getTop(){
  if(profile.system==='want'){
    const sys={GOV:scores.GOV,INST:scores.INST,SOE:scores.SOE};
    const top=Object.entries(sys).sort((a,b)=>b[1]-a[1])[0];
    return top[1]>=1?top[0]:'GOV';
  }
  const ext={I:scores.I,S:scores.S,A:scores.A,E:scores.E,R:scores.R,C:scores.C};
  return Object.entries(ext).sort((a,b)=>b[1]-a[1])[0][0];
}

    notFor:'需要大量不确定性判断、抽象概念分析、或长时间停留在构思阶段的工作会让你没耐心。',
    dirs:p=>{const b=['工程师/开发','运维/测试','技术支持','质量管理','供应链'];if(p.major==='stem')return['软件工程','硬件工程','工业设计','嵌入式开发',...b];if(p.major==='med')return['医疗器械','实验室技术','临床协调','医疗运营',...b];if(p.major==='art')return['设计执行','视频制作','展览制作',...b];return b;},
    next:p=>{const ag=p.agency==='active'?'你是主动型——选一个你真正愿意深耕的技能，主动找项目练手，做出来的东西比简历更有说服力。':'你是被动型——你做事可靠，但需要有人给你机会。不妨主动做一个个人项目来展示执行力，而不是等别人发现你。';if(p.pathFeel==='yes')return ag+' 深耕一个具体技能，让自己成为某件事"做得最好"的那个人。';return ag+' 选一个你真正愿意动手做的领域，先从实操入手——做出来的东西比简历更有说服力。';}
  }
};

function render(){
  const root=document.getElementById('root');
  if(phase==='cover')root.innerHTML=renderCover();
  else if(phase==='s1')root.innerHTML=renderS1();
  else if(phase==='s2')root.innerHTML=renderS2();
  else root.innerHTML=renderResult();
  bindEvents();
  window.scrollTo(0,0);
}

function renderCover(){
  return `<div style="text-align:center;padding:2.5rem 0 1rem;">
    <div style="font-size:56px;margin-bottom:1rem;">🧭</div>
    <div style="font-size:24px;font-weight:600;color:#111;margin-bottom:0.75rem;">职业方向测评</div>
    <div style="font-size:15px;color:#555;line-height:1.9;margin-bottom:1.5rem;">不是给你贴一个人格标签<br>而是结合你的背景和真实处境<br><strong style="color:#111;">给你一个真正值得探索的方向</strong></div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.75rem;">
      ${['约8分钟','根据背景出题','考虑现实约束','给出具体方向'].map(t=>`<span class="tag">${t}</span>`).join('')}
    </div>
    <button class="primary-btn" id="startBtn">开始测评 →</button>
  </div>`;
}

function renderS1(){
  const item=STAGE1[s1idx];
  const pct=Math.round((s1idx+1)/STAGE1.length*100);
  return `<div style="padding-top:1rem;">
    <div style="font-size:12px;color:#999;margin-bottom:8px;letter-spacing:0.5px;">第一部分 · 了解你的情况 · ${s1idx+1} / ${STAGE1.length}</div>
    <div class="progress-track"><div style="height:4px;background:#9FE1CB;border-radius:2px;width:${pct}%;"></div></div>
    <div style="font-size:18px;font-weight:500;color:#111;margin-bottom:${item.sub?'6px':'1.25rem'};line-height:1.6;">${item.q}</div>
    ${item.sub?`<div style="font-size:14px;color:#999;margin-bottom:1.1rem;">${item.sub}</div>`:''}
    <div id="opts">${item.opts.map(o=>`<button class="opt-btn" data-v="${o.v}">${o.t}</button>`).join('')}</div>
  </div>`;
}

function renderS2(){
  const item=s2queue[s2idx];
  const pct=Math.round((s2idx+1)/s2queue.length*100);
  return `<div style="padding-top:1rem;">
    <div style="font-size:12px;color:#999;margin-bottom:8px;letter-spacing:0.5px;">第二部分 · 情景偏好 · ${s2idx+1} / ${s2queue.length}</div>
    <div class="progress-track"><div style="height:4px;background:#7F77DD;border-radius:2px;width:${pct}%;"></div></div>
    <div style="font-size:18px;font-weight:500;color:#111;margin-bottom:1.25rem;line-height:1.6;">${item.q}</div>
    <div id="opts">${item.opts.map((o,i)=>`<button class="opt-btn" data-idx="${i}" data-d="${o.d}">${o.t}</button>`).join('')}</div>
  </div>`;
}

function renderResult(){
  const top=getTop(),t=RESULTS[top];
  const majorLabel={stem:'理工科',biz:'商科',hum:'文科/社科',art:'艺术/设计',med:'医学/心理',law:'法学/政治'}[profile.major]||'';
  const feelLabel={yes:'认同现有路径',meh:'感觉不够有劲',lost:'不认同但迷茫',no:'明确想换方向'}[profile.pathFeel]||'';
  const sysLabel={want:'倾向体制内',open:'体制内外都可',no:'倾向体制外'}[profile.system]||'';
  const cityLabel={tier1:'一线城市',province:'省会/新一线',hometown:'回老家'}[profile.city]||'';
  const agLabel=profile.agency==='active'?'主动型':'被动型';
  const dirsRaw=typeof t.dirs==='function'?t.dirs(profile):t.dirs();
  const dirTags=dirsRaw.slice(0,8).map(j=>`<span class="dir-tag">${j}</span>`).join('');
  const nextText=typeof t.next==='function'?t.next(profile):t.next;
  return `<div style="padding-top:1rem;">
    <div class="card">
      <div style="font-size:13px;color:#999;margin-bottom:10px;">${majorLabel} · ${feelLabel} · ${sysLabel} · ${cityLabel} · ${agLabel}</div>
      <div style="font-size:25px;font-weight:600;color:#111;margin-bottom:8px;">${t.name}</div>
      <div class="badge">${t.core}</div>
      <div style="font-size:15px;color:#555;line-height:1.85;margin-bottom:1.25rem;">${t.desc}</div>
      <div class="warn-box">
        <div style="font-size:12px;color:#B08000;margin-bottom:6px;">你可能有时候会想……</div>
        <div style="font-size:14px;color:#555;line-height:1.75;">${t.shadow}</div>
      </div>
      <div class="info-box">
        <div style="font-size:12px;color:#999;margin-bottom:6px;">⚡ 可能不适合你的方向</div>
        <div style="font-size:14px;color:#555;line-height:1.75;">${t.notFor}</div>
      </div>
      <div class="info-box">
        <div style="font-size:12px;color:#999;margin-bottom:8px;">基于你的背景和现实处境，建议</div>
        <div style="font-size:15px;color:#111;line-height:1.8;">${nextText}</div>
      </div>
      <div style="font-size:14px;font-weight:500;color:#555;margin-bottom:10px;">结合你的背景，值得探索的方向</div>
      <div style="margin-bottom:1.5rem;line-height:2.2;">${dirTags}</div>
      <div style="border-top:0.5px solid #ddd;padding-top:1rem;font-size:14px;color:#999;line-height:1.8;">
        这些方向不是唯一答案，是值得认真看一看的起点。<br>📌 截图发给朋友，看看你们分别是什么类型~
      </div>
    </div>
    <button class="secondary-btn" id="restartBtn">重新测一次</button>
  </div>`;
}

function bindEvents(){
  const s=document.getElementById('startBtn');
  if(s)s.onclick=()=>{phase='s1';s1idx=0;render();};
  if(phase==='s1'){
    document.querySelectorAll('#opts button').forEach(btn=>{
      btn.onclick=()=>{
        profile[STAGE1[s1idx].id]=btn.dataset.v;
        if(s1idx<STAGE1.length-1){s1idx++;render();}
        else{buildQueue();phase='s2';s2idx=0;render();}
      };
    });
  }
  if(phase==='s2'){
    document.querySelectorAll('#opts button').forEach(btn=>{
      btn.onclick=()=>{
        addScore(btn.dataset.d);
        if(s2idx<s2queue.length-1){s2idx++;render();}
        else{phase='result';render();}
      };
    });
  }
  const r=document.getElementById('restartBtn');
  if(r)r.onclick=()=>{
    profile={major:null,status:null,pathFeel:null,system:null,city:null,constraint:null,agency:null};
    scores={I:0,S:0,A:0,E:0,R:0,C:0,GOV:0,INST:0,SOE:0};
    s2queue=[];s2idx=0;s1idx=0;phase='cover';render();
  };
}

render();
</script>
</body>
</html>
