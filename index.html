// ── 组建第二部分题目队列 ─────────────────────────────────
function buildQueue() {
  const q = [];

  if (P.system === 'want') {
    S2_SYSTEM.forEach(item => {
      if (item.condition && !item.condition()) return;
      q.push(item);
    });
  } else {
    // aspire加分（如果有追问答案）
    if (P.aspire && ASPIRE_SCORE[P.aspire]) ASPIRE_SCORE[P.aspire]();

    q.push(...S2_EXT_UNIVERSAL);

    if (P.city === 'tier1') q.push(...S2_EXT_TIER1);
    else q.push(...S2_EXT_LOCAL);

    if (P.agency === 'active') q.push(S2_EXT_AGENCY_ACTIVE);
    else q.push(S2_EXT_AGENCY_PASSIVE);

    // 专业题路由：优先用aspire覆盖的major，没有则用原major
    const majorKey = (P.aspire && ASPIRE_TO_MAJOR[P.aspire]) || P.major;
    if (S2_MAJOR[majorKey]) q.push(S2_MAJOR[majorKey]);

    if (P.pathFeel === 'lost' || P.pathFeel === 'no') q.push(...S2_LOST);
  }

  s2queue = q;
}

// ── 算分 + 分流 ──────────────────────────────────────────
function handleAnswer(item, optIdx) {
  const opt = item.opts[optIdx];
  if (opt.sc) opt.sc();
  if (item.key && opt.kv) KEY[item.key] = opt.kv;
}

function getResult() {
  if (P.system === 'want') {
    return getSystemResult();
  }
  return getExtResult();
}

function getSystemResult() {
  // 先判断是否是"有点抵触但还是试试"型 → 可能更适合SOE
  const isAmbivalent = KEY.system_cost === 'ambivalent' || KEY.system_cost === 'resistant';
  if (isAmbivalent && SYS.SOE >= 2) return 'SOE';

  const scores = [
    ['GOV_base', SYS.GOV_base],
    ['GOV_policy', SYS.GOV_policy],
    ['INST_tech', SYS.INST_tech],
    ['INST_research', SYS.INST_research],
    ['SOE', SYS.SOE]
  ];
  scores.sort((a, b) => b[1] - a[1]);
  return scores[0][0];
}

function getExtResult() {
  // 迷茫型判断
  const isLost = P.pathFeel === 'lost' || P.pathFeel === 'no';
  const maxSC = Math.max(SC.I, SC.S, SC.A, SC.E, SC.C, SC.R);
  if (isLost && maxSC <= 2) return 'TRANSITION';

  // 创业型判断：主动+高不确定性接受+E分高
  if (P.agency === 'active' && KEY.uncertainty_q === 'excited' && SC.E >= 4) return 'STARTUP';

  // 稳健独立型：非一线城市+体制外
  if ((P.city === 'province' || P.city === 'hometown') && P.system !== 'want') {
    // 如果I或R最高，给稳健独立型
    if ((SC.I >= SC.E && SC.I >= SC.S && SC.I >= SC.A) ||
        (SC.R >= SC.E && SC.R >= SC.S && SC.R >= SC.A)) {
      if (SC.I + SC.R >= 5) return 'STEADY';
    }
  }

  const top = Object.entries(SC).sort((a,b)=>b[1]-a[1])[0][0];
  return top;
}

// ── 矛盾检测：返回0-2条矛盾描述 ─────────────────────────
function detectContradictions() {
  const items = [];

  // 矛盾1：独立偏好 vs 满足感来自帮助人
  if (KEY.collab_q === 'growth' && KEY.satisfy_q === 'help') {
    items.push('你说更喜欢和聪明的人合作、更看重成长，但你说做完一件事让你最觉得值的，是"有人因为这件事变好了"。这两件事会在你选岗位时产生真实冲突——你需要的是一个能独立深度工作、但又能直接影响到真实的人的岗位，这类岗位存在但不多，值得专门去找。');
  }

  // 矛盾2：主动型 + 迷茫 + 不确定性接受度高
  if (P.agency === 'active' && (P.pathFeel === 'lost' || P.pathFeel === 'no') && KEY.uncertainty_q === 'excited') {
    items.push('你是主动型，面对不确定性感到兴奋，但你还是迷茫——说明卡住你的不是能力或勇气，而是还没遇到一个你真正愿意为之投入的方向。你不缺行动力，你缺的是一个值得你行动的对象。');
  }

  // 矛盾3：想要深度 vs 满足感来自影响力/推动事情
  if (KEY.depth_q === 'depth' && KEY.satisfy_q === 'result') {
    items.push('你说想拥有在一个方向上做得很深的经历，但你说最让你觉得值的是"结果超出预期、而且是我推动的"。深度和推动结果不是矛盾的，但它们需要不同的岗位节奏——纯研究类满足深度但结果感弱，纯运营类结果感强但很难深耕。你的理想岗位在这两者之间。');
  }

  // 矛盾4：外部压力大 + 想优先考虑自己
  if (P.constraint === 'high' && P.agency === 'active') {
    items.push('你说家庭压力在你做决定时权重很大，但你又是主动型——这意味着你内心有自己的方向感，但外部约束会不断拉扯你。这个矛盾不需要"解决"，但需要你提前想清楚：当这两件事真正冲突的时候，你会怎么选？');
  }

  // 矛盾5：被动型 + aspire有强方向 + 卡在外部压力
  if (P.agency === 'passive' && P.aspire && P.aspire !== 'unclear' && KEY.stuck_q === 'external') {
    items.push(`你知道自己对${ASPIRE_LABEL[P.aspire] || '某个方向'}有感觉，但你说是外部压力让你没走——不是不知道，是没允许自己走。这和"迷茫"是完全不同的处境，解决方案也不同：你需要的不是探索，而是一次和家人的真实对话，或者一个能降低外部风险的过渡方案。`);
  }

  return items.slice(0, 2); // 最多显示2条，不要压垮用户
}

    },
    tension: () => '你现在感到迷茫，这是真实的。但"迷茫"不是一个需要被解决的问题，而是一个需要被经历的过程。你不需要现在就找到答案，但你需要开始行动——哪怕很小。',
    dirs: () => ['先不用锁定方向', '找3个真实的人聊聊他们的路', '做一件一直想做但没做的事', '把你好奇过的事情列一个清单']
  }
};

// ── 渲染函数 ──────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  if (phase === 'cover') root.innerHTML = renderCover();
  else if (phase === 's1') root.innerHTML = renderS1();
  else if (phase === 's2') root.innerHTML = renderS2();
  else root.innerHTML = renderResult();
  bindEvents();
  window.scrollTo(0, 0);
}

function renderCover() {
  return `<div style="text-align:center;padding:2.5rem 0 1rem;">
    <div style="font-size:54px;margin-bottom:1rem;">🧭</div>
    <div style="font-size:23px;font-weight:600;color:#111;margin-bottom:0.75rem;line-height:1.4;">职业方向测评</div>
    <div style="font-size:15px;color:#666;line-height:1.95;margin-bottom:1.5rem;">
      不是给你贴一个人格标签<br>
      而是结合你的背景和真实处境<br>
      <strong style="color:#111;">告诉你下一步最值得往哪里走</strong>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.75rem;">
      ${['约10分钟','根据你的情况出题','考虑体制/城市/压力','给出具体行动建议'].map(t=>`<span class="tag-pill">${t}</span>`).join('')}
    </div>
    <button class="primary-btn" id="startBtn">开始测评 →</button>
    <div style="font-size:13px;color:#bbb;margin-top:1rem;">选择你内心最真实的那个选项</div>
  </div>`;
}

function renderS1() {
  // trace追问阶段
  if (inTrace) {
    const item = traceQueue[traceIdx];
    return `<div style="padding-top:0.75rem;">
      <div class="q-label">了解你的情况 · 追问</div>
      <div class="progress-track"><div style="height:3.5px;background:#9FE1CB;border-radius:2px;width:95%;transition:width 0.3s;"></div></div>
      <div class="q-text">${item.q}</div>
      ${item.sub ? `<div class="q-sub">${item.sub}</div>` : ''}
      <div id="trace-opts">${item.opts.map(o => `<button class="opt-btn" data-v="${o.v}">${o.t}</button>`).join('')}</div>
    </div>`;
  }
  const item = STAGE1[s1idx];
  const pct = Math.round((s1idx + 1) / STAGE1.length * 100);
  return `<div style="padding-top:0.75rem;">
    <div class="q-label">了解你的情况 · ${s1idx+1} / ${STAGE1.length}</div>
    <div class="progress-track"><div style="height:3.5px;background:#9FE1CB;border-radius:2px;width:${pct}%;transition:width 0.3s;"></div></div>
    <div class="q-text">${item.q}</div>
    ${item.sub ? `<div class="q-sub">${item.sub}</div>` : ''}
    <div id="opts">${item.opts.map(o => `<button class="opt-btn" data-v="${o.v}">${o.t}</button>`).join('')}</div>
  </div>`;
}

function renderS2() {
  const item = s2queue[s2idx];
  const pct = Math.round((s2idx + 1) / s2queue.length * 100);
  const routeLabel = P.system === 'want' ? '体制内方向' : '体制外方向';
  return `<div style="padding-top:0.75rem;">
    <div class="q-label">${routeLabel} · ${s2idx+1} / ${s2queue.length}</div>
    <div class="progress-track"><div style="height:3.5px;background:#7F77DD;border-radius:2px;width:${pct}%;transition:width 0.3s;"></div></div>
    <div class="q-text">${item.q}</div>
    ${item.sub ? `<div class="q-sub">${item.sub}</div>` : ''}
    <div id="opts">${item.opts.map((o, i) => `<button class="opt-btn" data-idx="${i}">${o.t}</button>`).join('')}</div>
  </div>`;
}

function renderResult() {
  const key = getResult();
  const t = RESULTS[key];
  if (!t) return '<div style="padding:2rem;text-align:center;color:#999;">结果生成出现问题，请重新测试</div>';

  const majorLabel = {stem:'理工科',biz:'商科',hum:'文科/社科',art:'艺术/设计',med:'医学/心理',law:'法学/政治'}[P.major] || '';
  const feelLabel = {yes:'认同现有路径',meh:'感觉不够有劲',lost:'不认同但迷茫',no:'明确想换方向'}[P.pathFeel] || '';
  const sysLabel = {want:'倾向体制内',open:'体制内外都可',no:'倾向体制外'}[P.system] || '';
  const cityLabel = {tier1:'一线城市',province:'省会/新一线',hometown:'回老家'}[P.city] || '';
  const agLabel = P.agency === 'active' ? '主动型' : '被动型';

  // aspire补充说明
  const aspireTip = (P.aspire && P.aspire !== 'unclear' && ASPIRE_LABEL[P.aspire] && P.pathFeel !== 'yes')
    ? `<div style="font-size:13.5px;color:#7F77DD;background:#EEEDFE;border-radius:8px;padding:8px 12px;margin-bottom:1rem;line-height:1.7;">你学${majorLabel}，但你说真正有感觉的是<strong>${ASPIRE_LABEL[P.aspire]}</strong>——这一点也在下面的结果里有所体现。</div>`
    : '';

  // stuck_q 提示（卡点说明）
  const stuckMap = {
    no_path: '你知道自己想去的方向，但不知道怎么入行——这是信息问题，不是方向问题。下面的行动建议会告诉你具体怎么找到路径。',
    external: '你说外部压力是让你停在原地的主要原因。这不是迷茫，是约束。在做任何职业决策之前，值得先认真评估这个约束能不能被调整，或者有没有一个能同时满足外部期待和自己感受的方案。',
    unsure: '你不确定自己真的适合——这很正常，但"适合"这件事只能靠真实的接触来验证，而不是靠想象。下面的行动建议会给你一个低成本验证的方式。',
    not_ready: '你说还没准备好行动，这是诚实的。但"准备好"这种感觉往往不会自己到来——它需要一个小的触发。给自己设一个两周内能完成的最小行动，而不是等整个方向想清楚了再动。'
  };
  const stuckTip = KEY.stuck_q && stuckMap[KEY.stuck_q]
    ? `<div class="info-box" style="border-left:3px solid #7F77DD;">
        <div style="font-size:12px;color:#7F77DD;margin-bottom:5px;font-weight:500;">关于你说"还没走"的原因</div>
        <div style="font-size:14px;color:#444;line-height:1.8;">${stuckMap[KEY.stuck_q]}</div>
      </div>`
    : '';

  // 矛盾检测
  const contradictions = P.system !== 'want' ? detectContradictions() : [];
  const contradictionBlock = contradictions.length > 0
    ? `<div class="warn-box">
        <div style="font-size:12px;color:#A07800;margin-bottom:8px;font-weight:500;">你的答案里有一个值得注意的地方</div>
        ${contradictions.map(c => `<div style="font-size:14px;color:#5a4a00;line-height:1.8;margin-bottom:${contradictions.length>1?'10px':'0'}">${c}</div>`).join('')}
      </div>`
    : '';

  const summary = typeof t.summary === 'function' ? t.summary(P) : t.summary;
  const actionRaw = typeof t.action === 'function' ? t.action(P) : t.action;
  const tension = typeof t.tension === 'function' ? t.tension(P) : t.tension;
  const dirsRaw = typeof t.dirs === 'function' ? t.dirs(P) : t.dirs;
  const dirTags = (dirsRaw || []).slice(0, 8).map(j => `<span class="dir-tag">${j}</span>`).join('');

  // action三步结构：如果action是对象{s1,s2,s3}就分步渲染，否则直接渲染字符串
  let actionHTML;
  if (typeof actionRaw === 'object' && actionRaw.s1) {
    actionHTML = `
      <div style="margin-bottom:10px;">
        <div style="font-size:12px;color:#888;margin-bottom:4px;">这周能做</div>
        <div style="font-size:14px;color:#111;line-height:1.8;">${actionRaw.s1}</div>
      </div>
      <div style="border-top:0.5px solid #e8e8e8;padding-top:10px;margin-bottom:10px;">
        <div style="font-size:12px;color:#888;margin-bottom:4px;">这个月能做</div>
        <div style="font-size:14px;color:#111;line-height:1.8;">${actionRaw.s2}</div>
      </div>
      <div style="border-top:0.5px solid #e8e8e8;padding-top:10px;">
        <div style="font-size:12px;color:#888;margin-bottom:4px;">需要你判断的</div>
        <div style="font-size:14px;color:#111;line-height:1.8;">${actionRaw.s3}</div>
      </div>`;
  } else {
    actionHTML = `<div style="font-size:14.5px;color:#111;line-height:1.85;">${actionRaw}</div>`;
  }

  return `<div style="padding-top:0.5rem;">
    <div class="card">
      <div style="font-size:12.5px;color:#aaa;margin-bottom:10px;line-height:1.7;">${majorLabel} · ${feelLabel} · ${sysLabel} · ${cityLabel} · ${agLabel}</div>
      <div style="font-size:23px;font-weight:600;color:#111;margin-bottom:10px;line-height:1.35;">${t.name}</div>
      ${aspireTip}
      <div style="font-size:14.5px;color:#555;line-height:1.85;margin-bottom:1.2rem;">${summary}</div>

      <div class="badge">你的核心竞争力</div>
      <div style="font-size:14.5px;color:#333;line-height:1.85;margin-bottom:1.2rem;">${t.strength}</div>

      ${contradictionBlock}

      <div class="warn-box">
        <div style="font-size:12px;color:#A07800;margin-bottom:5px;font-weight:500;">你可能有时候会想……</div>
        <div style="font-size:14px;color:#5a4a00;line-height:1.8;">${t.shadow}</div>
      </div>

      <div class="info-box">
        <div style="font-size:12px;color:#888;margin-bottom:5px;font-weight:500;">⚡ 可能不适合你的方向</div>
        <div style="font-size:14px;color:#444;line-height:1.8;">${t.notFor}</div>
      </div>

      ${stuckTip}

      <div class="info-box">
        <div style="font-size:12px;color:#888;margin-bottom:10px;font-weight:500;">✦ 下一步最值得做的事</div>
        ${actionHTML}
      </div>

      <div class="tension-box">
        <div style="font-size:12px;color:#cc4444;margin-bottom:5px;font-weight:500;">你需要认真想清楚的一件事</div>
        <div style="font-size:14px;color:#5a1a1a;line-height:1.8;">${tension}</div>
      </div>

      ${dirTags ? `<div style="font-size:13.5px;font-weight:500;color:#666;margin-bottom:10px;margin-top:0.5rem;">结合你的背景，值得探索的方向</div>
      <div style="margin-bottom:1.5rem;line-height:2.2;">${dirTags}</div>` : ''}

      <div style="border-top:0.5px solid #eee;padding-top:1rem;font-size:13px;color:#bbb;line-height:1.9;">
        这是基于你的回答给出的参考，不是唯一答案。<br>
        📌 截图给朋友，看看你们各自是什么类型
      </div>
    </div>
    <button class="secondary-btn" id="restartBtn">重新测一次</button>
  </div>`;
}

// ── 事件绑定 ──────────────────────────────────────────────
function bindEvents() {
  const s = document.getElementById('startBtn');
  if (s) s.onclick = () => { phase='s1'; s1idx=0; inTrace=false; render(); };

  if (phase === 's1') {
    // trace追问阶段的按钮
    document.querySelectorAll('#trace-opts button').forEach(btn => {
      btn.onclick = () => {
        const curTraceItem = traceQueue[traceIdx];
        // 判断是第几道追问
        if (curTraceItem.id === 'stuck_q') {
          KEY.stuck_q = btn.dataset.v;
        } else {
          P.aspire = btn.dataset.v;
        }
        traceIdx++;
        if (traceIdx < traceQueue.length) {
          render(); // 继续下一道追问
          return;
        }
        inTrace = false;
        s1idx++;
        if (s1idx < STAGE1.length) { render(); }
        else { buildQueue(); phase='s2'; s2idx=0; render(); }
      };
    });

    // 正常第一部分按钮
    document.querySelectorAll('#opts button').forEach(btn => {
      btn.onclick = () => {
        const curItem = STAGE1[s1idx];
        P[curItem.id] = btn.dataset.v;

        // 答完pathFeel（第3题，idx=2）后，判断是否需要插入追问
        if (curItem.id === 'pathFeel' && P.pathFeel !== 'yes') {
          const traceKey = P.major + '_' + P.pathFeel;
          const q1 = TRACE_QUESTIONS[traceKey];
          // 无论有没有专业定制追问，都追问"卡在哪里"
          traceQueue = q1 ? [q1, TRACE_Q2] : [TRACE_Q2];
          traceIdx = 0;
          inTrace = true;
          render();
          return;
        }

        if (s1idx < STAGE1.length - 1) { s1idx++; render(); }
        else { buildQueue(); phase='s2'; s2idx=0; render(); }
      };
    });
  }

  if (phase === 's2') {
    document.querySelectorAll('#opts button').forEach(btn => {
      btn.onclick = () => {
        handleAnswer(s2queue[s2idx], parseInt(btn.dataset.idx));
        if (s2idx < s2queue.length - 1) { s2idx++; render(); }
        else { phase='result'; render(); }
      };
    });
  }

  const r = document.getElementById('restartBtn');
  if (r) r.onclick = () => {
    P={major:null,status:null,pathFeel:null,system:null,city:null,constraint:null,agency:null,aspire:null};
    SC={I:0,S:0,A:0,E:0,C:0,R:0};
    SYS={GOV_base:0,GOV_policy:0,INST_tech:0,INST_research:0,SOE:0};
    KEY={meaning_q:null,uncertainty_q:null,system_cost:null,satisfy_q:null,collab_q:null,depth_q:null,stuck_q:null};
    traceQueue=[];traceIdx=0;inTrace=false;
    s2queue=[];s2idx=0;s1idx=0;phase='cover';
    render();
  };
}

render();
</script>
</body>
</html>
